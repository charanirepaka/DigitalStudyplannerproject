<!DOCTYPE html>
<html>
<head>
    <title>Smart Scheduler</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Smart Scheduler</h1>
<div id="clock"></div>

<div class="controls">
    <input type="text" id="taskName" placeholder="Task Name">
    <input type="date" id="taskDate">

    <select id="day">
        <option value="monday">Monday</option>
        <option value="tuesday">Tuesday</option>
        <option value="wednesday">Wednesday</option>
        <option value="thursday">Thursday</option>
        <option value="friday">Friday</option>
        <option value="saturday">Saturday</option>
        <option value="sunday">Sunday</option>
    </select>

    <label>Start:</label>
    <select id="startHour"></select> :
    <select id="startMinute">
        <option value="00">00</option>
        <option value="15">15</option>
        <option value="30">30</option>
        <option value="45">45</option>
    </select>
    <select id="startAMPM">
        <option>AM</option>
        <option>PM</option>
    </select>

    <label>End:</label>
    <select id="endHour"></select> :
    <select id="endMinute">
        <option value="00">00</option>
        <option value="15">15</option>
        <option value="30">30</option>
        <option value="45">45</option>
    </select>
    <select id="endAMPM">
        <option>AM</option>
        <option>PM</option>
    </select>

    <button onclick="addTask()">Add Task</button>
</div>

<div class="calendar">
    <div class="day-column" id="monday"><h3>Monday</h3></div>
    <div class="day-column" id="tuesday"><h3>Tuesday</h3></div>
    <div class="day-column" id="wednesday"><h3>Wednesday</h3></div>
    <div class="day-column" id="thursday"><h3>Thursday</h3></div>
    <div class="day-column" id="friday"><h3>Friday</h3></div>
    <div class="day-column" id="saturday"><h3>Saturday</h3></div>
    <div class="day-column" id="sunday"><h3>Sunday</h3></div>
</div>

<script>
const startHour = document.getElementById("startHour");
const endHour = document.getElementById("endHour");

for (let i = 1; i <= 12; i++) {
    startHour.innerHTML += `<option value="${i}">${i}</option>`;
    endHour.innerHTML += `<option value="${i}">${i}</option>`;
}
</script>

<script src="script.js"></script>
</body>
</html>
